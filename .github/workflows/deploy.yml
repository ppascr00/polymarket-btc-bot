name: Deploy to GCE VM

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            dashboard/package-lock.json

      - name: Validate bot build
        run: |
          npm ci
          npm run build

      - name: Pack project
        run: |
          git archive --format=tar.gz --output=app.tar.gz HEAD

      - name: Upload package to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: app.tar.gz
          target: /tmp

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 30m
          command_timeout: 80m
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR="${{ secrets.APP_DIR }}"
            if [ -z "$APP_DIR" ]; then
              echo "APP_DIR secret is empty"
              exit 1
            fi

            mkdir -p "$APP_DIR"
            tar -xzf /tmp/app.tar.gz -C "$APP_DIR"
            rm -f /tmp/app.tar.gz

            # Optional: manage .env from GitHub secret.
            # If APP_ENV is not set, keep existing file on server.
            if [ -n "${{ secrets.APP_ENV }}" ]; then
              printf '%s\n' "${{ secrets.APP_ENV }}" > "$APP_DIR/.env"
            fi

            cd "$APP_DIR"

            if command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              COMPOSE_CMD="docker compose"
            fi

            # Use a stable project name to keep resource cleanup scoped.
            export COMPOSE_PROJECT_NAME="polymarket-btc-bot"

            cleanup() {
              # Always run, even if deploy fails.
              docker container prune -f || true
              docker image prune -f || true
              docker builder prune -f || true
            }
            trap cleanup EXIT

            # Pre-cleanup: stop/remove old containers from this compose project.
            $COMPOSE_CMD down --remove-orphans || true

            $COMPOSE_CMD up -d --build --remove-orphans
            $COMPOSE_CMD ps

      - name: Cleanup VM (always)
        if: ${{ always() }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 15m
          command_timeout: 15m
          script_stop: false
          script: |
            set +e
            docker container prune -f || true
            docker image prune -f || true
            docker builder prune -f || true
