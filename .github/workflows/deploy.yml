name: Deploy to GCE VM

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          owner_lc="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "owner_lc=$owner_lc" >> "$GITHUB_OUTPUT"
          echo "bot_image=ghcr.io/$owner_lc/polymarket-btc-bot-bot" >> "$GITHUB_OUTPUT"
          echo "dashboard_image=ghcr.io/$owner_lc/polymarket-btc-bot-dashboard" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push bot image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.bot_image }}:${{ github.sha }}
            ${{ steps.meta.outputs.bot_image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push dashboard image
        uses: docker/build-push-action@v6
        with:
          context: ./dashboard
          file: ./dashboard/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.dashboard_image }}:${{ github.sha }}
            ${{ steps.meta.outputs.dashboard_image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Pack project
        run: |
          git archive --format=tar.gz --output=app.tar.gz HEAD

      - name: Upload package to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: app.tar.gz
          target: /tmp

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 30m
          command_timeout: 80m
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR="${{ secrets.APP_DIR }}"
            if [ -z "$APP_DIR" ]; then
              echo "APP_DIR secret is empty"
              exit 1
            fi

            mkdir -p "$APP_DIR"
            tar -xzf /tmp/app.tar.gz -C "$APP_DIR"
            rm -f /tmp/app.tar.gz

            # Optional: manage .env from GitHub secret.
            # If APP_ENV is not set, keep existing file on server.
            if [ -n "${{ secrets.APP_ENV }}" ]; then
              printf '%s\n' "${{ secrets.APP_ENV }}" > "$APP_DIR/.env"
            fi

            cd "$APP_DIR"

            if command -v docker-compose >/dev/null 2>&1; then
              COMPOSE_CMD="docker-compose"
            else
              COMPOSE_CMD="docker compose"
            fi

            # Optional GHCR login for private package pulls.
            if [ -n "${{ secrets.GHCR_USERNAME }}" ] && [ -n "${{ secrets.GHCR_TOKEN }}" ]; then
              echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            fi

            # Use a stable project name to keep resource cleanup scoped.
            export COMPOSE_PROJECT_NAME="polymarket-btc-bot"
            export BOT_IMAGE="${{ steps.meta.outputs.bot_image }}:${{ github.sha }}"
            export DASHBOARD_IMAGE="${{ steps.meta.outputs.dashboard_image }}:${{ github.sha }}"

            cleanup() {
              # Always run, even if deploy fails.
              docker container prune -f || true
              docker image prune -f || true
              docker builder prune -f || true
            }
            trap cleanup EXIT

            # Pull built images from registry and roll containers without rebuilding in VM.
            $COMPOSE_CMD pull bot dashboard
            $COMPOSE_CMD up -d --remove-orphans
            $COMPOSE_CMD ps

      - name: Cleanup VM (always)
        if: ${{ always() }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 15m
          command_timeout: 15m
          script_stop: false
          script: |
            set +e
            docker container prune -f || true
            docker image prune -f || true
            docker builder prune -f || true
