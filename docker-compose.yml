version: '3.8'

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: polymarket-btc-bot
    env_file: .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    depends_on: []
    networks:
      - bot-network

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: polymarket-dashboard
    env_file: .env
    environment:
      - DB_PATH=/app/data/bot.db
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    volumes:
      - ./data:/app/data:ro
    restart: unless-stopped
    networks:
      - bot-network

networks:
  bot-network:
    driver: bridge
